<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Fotografia em Niterói e região">
<meta name="keyword" content="fotografia,Niterói,ensaios">
<meta name="author" content="Aileen Carneiro">

<title>Lumina Fotografia</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>    

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body> 
<header>

<img src="img/lumina.png" alt="Lumina Fotografia">

</header>

<!-- GALERIA -->
<div class="swiper">
  
  <div class="swiper-wrapper">

    <div class="swiper-slide">
      <img src="img/img1.png">
    </div>

    <div class="swiper-slide">
      <img src="img/img2.png">
    </div>

    <div class="swiper-slide">
      <img src="img/img3.png">
    </div>

    <div class="swiper-slide">
      <img src="img/img4.png">
    </div>

  </div>

</div>
<!--BOTAO ZAP-->
<a href="https://wa.me/5514996473255" class="whatsapp-button" target="_blank">
<img src="img/whatsapp.png" alt="WhatsApp">
</a>
<!--saiba mais-->
<a href="#mais" class="botao-saiba-mais">Saiba mais</a>

<!--SCRIPT DO SWIPPER -->
<script type="module">

import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.mjs'

const swiper = new Swiper('.swiper', {

  effect: "coverflow",
  grabCursor: true,
  centeredSlides: true,
  slidesPerView: "auto",
  loop: true,

  autoplay: {
    delay: 3000,
    disableOnInteraction: false,
  },

  coverflowEffect: {
    rotate: 30,
    stretch: 0,
    depth: 200,
    modifier: 1,
    slideShadows: false,
  },

});

</script>
<!--SCRIPT DO SWIPPERE -->
</body>
</html>
